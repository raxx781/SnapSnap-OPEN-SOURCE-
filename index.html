<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapSnap - Login</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <h1>SnapSnap</h1>
                <p class="tagline">Chat with your friends</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <h2>Welcome back!</h2>
                <p class="subtitle">We're so excited to see you again!</p>
                <div class="form-group">
                    <label for="login-email">EMAIL</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">PASSWORD</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary">Log In</button>
                <p class="switch-text">Need an account? <a href="#" id="show-signup">Register</a></p>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form">
                <h2>Create an account</h2>
                <div class="form-group">
                    <label for="signup-email">EMAIL</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="form-group">
                    <label for="signup-username">USERNAME</label>
                    <input type="text" id="signup-username" required minlength="3" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="signup-password">PASSWORD</label>
                    <input type="password" id="signup-password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary">Continue</button>
                <p class="switch-text"><a href="#" id="show-login">Already have an account?</a></p>
            </form>

            <div id="auth-error" class="error-message"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
