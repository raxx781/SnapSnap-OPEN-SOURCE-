<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DisClone</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app" class="app-container">

  <!-- Server List -->
  <div class="server-list">
    <div class="server-icon home-icon active" id="home-btn" title="Home">🏠</div>
    <div class="server-separator"></div>
    <div id="server-icons"></div>
    <div class="server-icon add-server-icon" id="add-server-btn" title="Add a Server">+</div>
  </div>

  <!-- Sidebar -->
  <div class="channel-sidebar">
    <div id="home-header" class="sidebar-header">
      <input type="text" placeholder="Search..." id="search-input" readonly>
    </div>
    <div id="server-header" class="sidebar-header" style="display:none;">
      <h3 id="server-name-header">Server Name</h3>
    </div>

    <div id="home-nav">
      <div class="nav-item active" data-view="friends">👥 Friends</div>
      <h4 class="section-title">DIRECT MESSAGES</h4>
      <div id="dm-list"></div>
    </div>

    <div id="server-channels" style="display:none;">
      <div class="channel-category">
        <h4 class="section-title">TEXT CHANNELS <span class="add-channel-btn" id="add-channel-btn" title="Create Channel">+</span></h4>
        <div id="channel-list"></div>
      </div>
      <div class="channel-category">
        <h4 class="section-title">MEMBERS</h4>
        <div id="invite-info">
          <p class="invite-label">Server ID (share to invite):</p>
          <code id="server-id-display"></code>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div id="chat-view" style="display:none;">
      <div class="chat-header">
        <span class="chat-header-icon">#</span>
        <span id="chat-header-name">channel-name</span>
      </div>
      <div class="messages-container" id="messages-container">
        <div id="messages"></div>
      </div>
      <div class="message-input-container">
        <form id="message-form">
          <input type="text" id="message-input" placeholder="Message #channel" autocomplete="off">
        </form>
      </div>
    </div>

    <div id="friends-view">
      <h3>Friends List</h3>
      <div id="friends-list"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<!-- App Scripts -->
<script src="js/ui.js"></script>
<script src="js/servers.js"></script>
<script src="js/messages.js"></script>
<script src="js/app.js"></script>

</body>
</html>
